name: tibaneapp
description: "Tibane Labs - Solana tools for the Seeker"
publish_to: 'none'
version: 0.1.13+79

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.0.0
  provider: ^6.0.0
  http: ^1.0.0
  url_launcher: ^6.0.0
  shared_preferences: ^2.0.0
  crypto: ^3.0.0
  solana_mobile_client: ^0.1.2
  atonline_api: ^0.5.1
  libwallet: ^0.4.75
  path_provider: ^2.1.0
  webview_flutter: ^4.10.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  share_plus: ^12.0.0
  file_picker: ^11.0.2
  app_links: ^7.0.0
  phone_form_field: ^10.0.17
  flutter_secure_storage: ^10.2.0
  cryptography: ^2.9.0
  biometric_storage: ^5.1.0-rc.5
  local_auth: ^3.0.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#030305"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true

  # Enables gen_l10n localization codegen (see l10n.yaml). Generated
  # AppLocalizations classes are written to lib/l10n/gen/.
  generate: true

  assets:
    - assets/
    - assets/account_pfps/
    - assets/icons/
